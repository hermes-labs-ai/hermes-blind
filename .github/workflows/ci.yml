name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Tests (pytest)
        run: pytest -v --tb=short

      - name: Isolated install smoke test
        run: |
          python -m venv /tmp/isolated
          /tmp/isolated/bin/pip install .
          /tmp/isolated/bin/python -c "from hermes_blind import wrap, extract_disclosure, VARIANTS; \
            assert 'HERMES-BLIND' in wrap('x'); \
            assert wrap('y', variant='null') == 'y'; \
            assert set(VARIANTS) == {'null', 'micro', 'short', 'v1', 'full'}; \
            print('smoke ok')"
